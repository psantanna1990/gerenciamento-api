# Configuração de testes
# Usa H2 em memória para manter os testes isolados do PostgreSQL local.
quarkus.oidc.enabled=false
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:gerenciamento-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE

# O schema de teste é criado pelo Hibernate para evitar dependência externa.
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway não é necessário nos testes unitários atuais.
quarkus.flyway.migrate-at-start=false
